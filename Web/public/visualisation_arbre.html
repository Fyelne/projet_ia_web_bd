<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Visualisation des arbres</title>
    <link rel="icon" type="image/png" href="../assets/image/logo_sq.png">
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Bibliothèque Plotly -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>Gestion du Patrimoine Arboré</h1>
    </header>

    <!-- NAVBAR -->
    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="ajout_arbre.html">Ajouter un arbre</a></li>
            <li><a href="visualisation_arbre.html">Visualisation</a></li>
            <li><a href="prediction_clusters.html">Prédictions</a></li>
        </ul>
    </nav>

    <!-- CONTENU -->
    <main>
        <section class="card">
            <h2>Prédiction des clusters</h2> 
            <div id="map"></div>
            <div class="actions-visualisation">
                <label for="nb-clusters">Nombre de clusters :</label>
                <select id="nb-clusters">
                    <option value="2">2</option>
                    <option value="3" selected>3</option>
                </select>
                <button id="btn-predire-clusters" type="button">Prédire les clusters</button>
            </div>
        </section>
        <section class="card">
            <h2>Visualisation des arbres</h2>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Espèce</th>
                            <th>Hauteur totale</th>
                            <th>Hauteur tronc</th>
                            <th>Diamètre</th>
                            <th>Remarquable</th>
                            <th>Latitude</th>
                            <th>Longitude</th>
                            <th>État</th>
                            <th>Stade</th>
                            <th>Port</th>
                            <th>Pied</th>
                        </tr>
                    </thead>
                    <tbody id="table-arbres">
                    </tbody>
                </table>
            </div>
            <div class="pagination-container">
                <div class="pagination-size">
                    <label for="limite-lignes">Lignes par page :</label>
                    <select id="limite-lignes">
                        <option value="10">10</option>
                        <option value="25" selected>25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>

                <div class="pagination-buttons">
                    <button id="btn-precedent" type="button">Précédent</button>
                    <span id="page-info">Page 1</span>
                    <button id="btn-suivant" type="button">Suivant</button>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>Projet FISA4 - Web / IA / Big Data - 2026</p>
    </footer>

    <script src="../assets/js/visualisation_arbre.js"></script>
</body>
</html>
