<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Arbres</title>
    <link rel="icon" type="image/png" href="../assets/image/logo_sq.png">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>Gestion du Patrimoine Arboré</h1>
    </header>

    <!-- NAVBAR -->
    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="ajout_arbre.html">Ajouter un arbre</a></li>
            <li><a href="visualisation_arbre.html">Visualisation</a></li>
            <li><a href="#">Prédictions</a></li>
        </ul>
    </nav>

    <!-- CONTENU -->
    <main>
        <section class="card">
            <h2>Ajouter un Arbre</h2>
            <form>
                <div class="form-group">
                    <label for="espece">Espèce :</label>
                    <input type="text" id="espece" name="espece" placeholder="Ex: Chêne" required>
                </div>

                <div class="form-group">
                    <label for="hauteur_totale">Hauteur totale (m) :</label>
                    <input type="number" id="hauteur_totale" name="hauteur_totale" step="0.1" placeholder="Ex: 12.5" required>
                </div>

                <div class="form-group">
                    <label for="hauteur_tronc">Hauteur du tronc (m) :</label>
                    <input type="number" id="hauteur_tronc" name="hauteur_tronc" step="0.1" placeholder="Ex: 4.2" required>
                </div>

                <div class="form-group">
                    <label for="diametre">Diamètre du tronc (cm) :</label>
                    <input type="number" id="diametre" name="diametre" step="0.1" placeholder="Ex: 30" required>
                </div>

                <div class="form-group">
                    <label for="remarquable">Arbre remarquable :</label>
                    <select id="remarquable" name="remarquable">
                        <option value="FAUX">Non</option>
                        <option value="VRAI">Oui</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="latitude">Latitude :</label>
                    <input type="number" id="latitude" name="latitude" step="0.000001" placeholder="Ex: 49.848" required>
                </div>

                <div class="form-group">
                    <label for="longitude">Longitude :</label>
                    <input type="number" id="longitude" name="longitude" step="0.000001" placeholder="Ex: 3.287" required>
                </div>

                <div class="form-group">
                    <label for="etat">État :</label>
                    <select id="etat" name="etat">
                        <option value="NA">Non-défini</option>
                        <option value="EN PLACE">En place</option>
                        <option value="ABATTU">Abattu</option>
                        <option value="Essouché">Essouché</option>
                        <option value="Non essouché">Non essouché</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="stade">Stade de développement :</label>
                    <select id="stade" name="stade">
                        <option value="NA">Non-défini</option>
                        <option value="jeune">Jeune</option>
                        <option value="adulte">Adulte</option>
                        <option value="vieux">Vieux</option>
                        <option value="senescent">Sénescent</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="port">Type de port :</label>
                    <select id="port" name="port">
                        <option value="NA">Non-défini</option>
                        <option value="semi libre">Semi-libre</option>
                        <option value="réduit">Réduit</option>
                        <option value="réduit relâché">Réduit relâché</option>
                        <option value="tête de chat relaché">Tête de chat relaché</option>
                        <option value="tête de chat">Tête de chat</option>
                        <option value="libre">Libre</option>
                        <option value="cépée">Cépée</option>
                        <option value="étêté">étêté</option>
                        <option value="rideau">Rideau</option>
                        <option value="couronné">Couronné</option>
                        <option value="têtard relâché">Têtard relâché</option>
                        <option value="têtard">Têtard</option>
                        <option value="architecturé">Architecturé</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="pied">Type de pied :</label>
                    <select id="pied" name="pied">
                        <option value="NA">Non-défini</option>
                        <option value="gazon">Gazon</option>
                        <option value="fosse arbre">Fosse arbre</option>
                        <option value="Revetement non permeable">Revetement non permeable</option>
                        <option value="Bande de terre">Bande de terre</option>
                        <option value="Bac de plantation">Bac de plantation</option>
                        <option value="terre">Terre</option>
                        <option value="végétation">Végétation</option>
                        <option value="toile tissée">Toile tissée</option>
                    </select>
                </div>

                <button type="submit">Ajouter l'arbre</button>
            </form>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>Projet FISA4 - Web / IA / Big Data - 2026</p>
    </footer>

</body>
</html>
